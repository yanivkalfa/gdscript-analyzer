# release-plz — Rust release engine (crates.io side of the dual-registry flow).
#
# Single shared version across the whole workspace (crates.io + npm move in
# lockstep, starting 0.1.0). release-plz computes the bump from Conventional
# Commits, runs cargo-semver-checks, writes the changelog (formatting delegated
# to cliff.toml), tags `v<version>`, and publishes on the Release PR merge.
#
# See plans/PHASE-0-ECOSYSTEM-AND-TOOLING.md §D and plans/01-ARCHITECTURE.md §9.

[workspace]
# All crates share one version and release together.
allow_dirty        = false        # never release from a dirty tree
changelog_update   = true         # regenerate CHANGELOG.md from commits
# Release ownership is SPLIT with `dist` (avoids two tools racing on the GitHub Release):
#   release-plz pushes the tag (which triggers release-napi/wasm/dist — needs the PAT), and
#   `dist` (release.yml) creates the GitHub Release + uploads the CLI/LSP binaries.
git_tag_enable     = true         # release-plz pushes `v<version>` (drives the whole release)
git_release_enable = false        # dist owns the GitHub Release, not release-plz
semver_check       = true         # run cargo-semver-checks before bumping
pr_branch_prefix   = "release-plz/"
# Delegate changelog formatting to the git-cliff config (the correct key is
# `changelog_config` here — NOT a `path` under a `[changelog]` table, which holds inline
# git-cliff fields and rejects `path`).
changelog_config   = "cliff.toml"

# The npm-/binary-distributed crates publish via their own pipelines (release-napi/wasm, dist), not
# crates.io. They carry `publish = false` in their Cargo.toml; release-plz REQUIRES its config to
# agree (it errors if the config's `publish` disagrees with Cargo.toml), so we mirror `publish =
# false` here. (gdscript-session is the internal core bundled into the bindings — never published.)
[[package]]
name    = "gdscript-session"
publish = false

[[package]]
name    = "gdscript-ffi"
publish = false

[[package]]
name    = "gdscript-wasm"
publish = false

[[package]]
name    = "gdscript-cli"
publish = false

[[package]]
name    = "gdscript-lsp"
publish = false

# ---------------------------------------------------------------------------
# 0.x bump policy (the canonical mapping from plans §D.2):
#   fix                     -> PATCH
#   feat                    -> PATCH   (do NOT let `feat` force a 0.x minor)
#   `!` / BREAKING CHANGE    -> MINOR   (the 0.x "major")
#
# release-plz derives the bump from cargo-semver-checks + Conventional Commits
# and follows Cargo's 0.x SemVer reading, under which a breaking change bumps
# the leading non-zero (0.x -> 0.(x+1)) and additive `feat` is a patch — which
# is exactly the mapping we want while < 1.0. We therefore do NOT override the
# default bump rules here; the default 0.x behaviour already yields feat=patch,
# breaking=minor. If a future release-plz version flips that default, pin it
# explicitly via a `[[package]]` override or the relevant `version_*` key:
#
#   [[package]]
#   name = "gdscript-ide"
#   # (set the explicit 0.x bump override here if the default ever changes)
#
# This block is intentionally documented rather than enforced so that the
# behaviour is captured even though the default already matches.
# ---------------------------------------------------------------------------
