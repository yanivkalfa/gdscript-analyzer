<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gdscript-analyzer · playground</title>
    <style>
      :root { color-scheme: dark; --bg:#1e1e2e; --panel:#181825; --fg:#cdd6f4; --muted:#9399b2;
              --err:#f38ba8; --warn:#f9e2af; --info:#89b4fa; --ok:#a6e3a1; --line:#313244; }
      * { box-sizing: border-box; }
      body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
             background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
      header { padding:8px 14px; background:var(--panel); border-bottom:1px solid var(--line);
               display:flex; align-items:center; gap:12px; }
      header h1 { font-size:14px; margin:0; font-weight:600; }
      header .status { color:var(--muted); font-size:12px; }
      main { flex:1; display:grid; grid-template-columns:1fr 360px; min-height:0; }
      #editor { min-height:0; border-right:1px solid var(--line); }
      .out { overflow:auto; padding:0; background:var(--panel); }
      .out .section { padding:8px 12px; border-bottom:1px solid var(--line); }
      .out h2 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
                margin:0 0 6px; }
      .diag { cursor:pointer; padding:2px 0; }
      .diag:hover { text-decoration:underline; }
      .diag .loc { color:var(--muted); }
      .sev-error { color:var(--err); } .sev-warning { color:var(--warn); }
      .sev-info, .sev-hint { color:var(--info); }
      .clean { color:var(--ok); }
      .hint { color:var(--muted); font-size:12px; }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/editor/editor.main.css"
    />
    <!-- Monaco's AMD loader (a classic script, runs before the deferred module below sets up the editor). -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  </head>
  <body>
    <header>
      <h1>gdscript-analyzer</h1>
      <span class="status" id="status">loading…</span>
    </header>
    <main>
      <div id="editor"></div>
      <div class="out" id="out">
        <div class="section">
          <h2>Diagnostics</h2>
          <div id="diags"><span class="hint">analyzing…</span></div>
        </div>
        <div class="section">
          <h2>About</h2>
          <div class="hint">
            A real <a href="https://github.com/yanivkalfa/gdscript-analyzer">gdscript-analyzer</a>
            running entirely in your browser (WebAssembly) — no server, no Godot editor. Hover a symbol
            for its inferred type; type <code>.</code> after a value for member completion. Diagnostics
            update live.
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      const $ = (id) => document.getElementById(id);
      const status = $("status");
      const URI = "inmemory://main.gd";
      const MONACO_BASE = "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs";

      const SAMPLE = `extends Node

@export var speed: int = 5

func _ready() -> void:
\tvar half = speed / 2          # INTEGER_DIVISION warning
\tvar doubled := await ramp()   # await recovers the coroutine return type (int)
\tprint(half, doubled)

func ramp() -> int:
\treturn speed * 2
`;

      // ---- byte (UTF-8) <-> UTF-16 conversion. The analyzer speaks UTF-8 byte offsets; Monaco
      //      positions/offsets are UTF-16 code units (JS string indices). This page owns the bridge. ----
      const enc = new TextEncoder();
      const utf16ToByte = (text, u16) => enc.encode(text.slice(0, u16)).length;
      function byteToUtf16(text, byteOff) {
        let bytes = 0, u16 = 0;
        for (const ch of text) {
          if (bytes >= byteOff) break;
          bytes += enc.encode(ch).length;
          u16 += ch.length;
        }
        return u16;
      }

      // ---- load the analyzer (wasm) ----
      let az = null;
      try {
        const mod = await import("./pkg/gdscript.js");
        await mod.default(); // instantiate the .wasm
        az = new mod.Analyzer();
        // The engine model (extension_api) is NOT embedded in the wasm — fetch + install it so
        // completion/hover for engine classes (Node/Control/…) resolve. Parse/type diagnostics work
        // without it.
        let engine = "no engine model — engine-class completions limited";
        try {
          const r = await fetch("./data/extension_api.bin");
          if (r.ok && az.loadEngineApi(new Uint8Array(await r.arrayBuffer()))) {
            engine = "engine model loaded";
          }
        } catch { /* keep the limited-mode message */ }
        status.textContent = `ready (${engine})`;
        az.openDocument(URI, SAMPLE, null);
      } catch (e) {
        status.textContent = "failed to load WASM — run `wasm-pack build` (see README): " + e;
        console.error(e);
      }

      // ---- load Monaco via its AMD loader (CDN), with a worker proxy so it runs offline-of-itself ----
      function loadMonaco() {
        return new Promise((resolve, reject) => {
          self.MonacoEnvironment = {
            getWorkerUrl() {
              const proxy = `self.MonacoEnvironment={baseUrl:'${MONACO_BASE}/../'};importScripts('${MONACO_BASE}/base/worker/workerMain.js');`;
              return `data:text/javascript;charset=utf-8,${encodeURIComponent(proxy)}`;
            },
          };
          // eslint-disable-next-line no-undef
          require.config({ paths: { vs: MONACO_BASE } });
          // eslint-disable-next-line no-undef
          require(["vs/editor/editor.main"], () => resolve(self.monaco), reject);
        });
      }

      const monaco = await loadMonaco();

      // A small GDScript Monarch grammar — enough for readable highlighting in the demo.
      monaco.languages.register({ id: "gdscript" });
      monaco.languages.setMonarchTokensProvider("gdscript", {
        keywords: ["if","elif","else","for","while","match","when","break","continue","pass","return",
          "func","var","const","enum","class","class_name","extends","signal","static","await","yield",
          "is","in","as","and","or","not","self","super","null","true","false","void","export","onready",
          "tool","breakpoint","assert","preload","load"],
        tokenizer: {
          root: [
            [/#.*$/, "comment"],
            [/@\w+/, "annotation"],
            [/\$[\w/%]*/, "variable"],
            [/"(?:[^"\\]|\\.)*"/, "string"],
            [/'(?:[^'\\]|\\.)*'/, "string"],
            [/\b\d[\d_]*\.?[\d_]*\b/, "number"],
            [/[A-Z]\w*/, "type.identifier"],
            [/[a-z_]\w*/, { cases: { "@keywords": "keyword", "@default": "identifier" } }],
          ],
        },
      });

      const editor = monaco.editor.create($("editor"), {
        value: SAMPLE,
        language: "gdscript",
        theme: "vs-dark",
        automaticLayout: true,
        minimap: { enabled: false },
        fontSize: 14,
        tabSize: 4,
        insertSpaces: false,
        scrollBeyondLastLine: false,
      });
      const model = editor.getModel();

      // ---- helpers bridging Monaco <-> analyzer offsets ----
      const byteAt = (position) => utf16ToByte(model.getValue(), model.getOffsetAt(position));
      function byteRangeToMonaco(text, start, end) {
        const a = model.getPositionAt(byteToUtf16(text, start));
        const b = model.getPositionAt(byteToUtf16(text, end));
        return {
          startLineNumber: a.lineNumber, startColumn: a.column,
          endLineNumber: b.lineNumber, endColumn: b.column,
        };
      }
      const SEVERITY = {
        error: monaco.MarkerSeverity.Error, warning: monaco.MarkerSeverity.Warning,
        info: monaco.MarkerSeverity.Info, hint: monaco.MarkerSeverity.Hint,
      };
      const COMPLETION_KIND = {
        keyword: monaco.languages.CompletionItemKind.Keyword,
        variable: monaco.languages.CompletionItemKind.Variable,
        parameter: monaco.languages.CompletionItemKind.Variable,
        constant: monaco.languages.CompletionItemKind.Constant,
        function: monaco.languages.CompletionItemKind.Function,
        method: monaco.languages.CompletionItemKind.Method,
        property: monaco.languages.CompletionItemKind.Property,
        field: monaco.languages.CompletionItemKind.Field,
        member: monaco.languages.CompletionItemKind.Field,
        class: monaco.languages.CompletionItemKind.Class,
        type: monaco.languages.CompletionItemKind.Class,
        enum: monaco.languages.CompletionItemKind.Enum,
        enum_member: monaco.languages.CompletionItemKind.EnumMember,
        signal: monaco.languages.CompletionItemKind.Event,
      };

      // ---- live diagnostics (markers + the side panel) ----
      function analyze() {
        if (!az) return;
        const text = model.getValue();
        az.changeDocument(URI, text);
        // Queries return native JS values now (no JSON.parse); unknown/empty → [].
        const diags = az.diagnostics(URI) ?? [];
        const markers = diags.map((d) => {
          const r = byteRangeToMonaco(text, d.range.start, d.range.end);
          return {
            severity: SEVERITY[d.severity] ?? monaco.MarkerSeverity.Warning,
            message: d.message, code: String(d.code ?? ""),
            startLineNumber: r.startLineNumber, startColumn: r.startColumn,
            endLineNumber: r.endLineNumber, endColumn: r.endColumn,
          };
        });
        monaco.editor.setModelMarkers(model, "gdscript", markers);
        renderDiagnosticList(diags, text);
      }

      function renderDiagnosticList(diags, text) {
        const box = $("diags");
        if (!diags.length) { box.innerHTML = '<span class="clean">No issues found.</span>'; return; }
        box.innerHTML = "";
        for (const d of diags) {
          const r = byteRangeToMonaco(text, d.range.start, d.range.end);
          const el = document.createElement("div");
          el.className = "diag sev-" + d.severity;
          el.innerHTML = `<span class="loc">${r.startLineNumber}:${r.startColumn}</span> [${escapeHtml(d.code)}] ${escapeHtml(d.message)}`;
          el.onclick = () => {
            editor.setSelection(r);
            editor.revealRangeInCenter(r);
            editor.focus();
          };
          box.appendChild(el);
        }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      }

      // ---- hover provider: the analyzer's inferred type + docs ----
      monaco.languages.registerHoverProvider("gdscript", {
        provideHover(_m, position) {
          if (!az) return null;
          const h = az.hover(URI, byteAt(position)); // object | null (no JSON.parse)
          if (!h?.ty_label) return null;
          const contents = [{ value: "```gdscript\n" + h.ty_label + "\n```" }];
          if (h.doc) contents.push({ value: h.doc });
          const range = h.range ? byteRangeToMonaco(model.getValue(), h.range.start, h.range.end) : undefined;
          return { range, contents };
        },
      });

      // ---- completion provider (triggered on `.` and by Ctrl-Space) ----
      monaco.languages.registerCompletionItemProvider("gdscript", {
        triggerCharacters: [".", "$", "%", "(", ","],
        provideCompletionItems(_m, position) {
          if (!az) return { suggestions: [] };
          const items = az.completions(URI, byteAt(position)) ?? []; // native array (no JSON.parse)
          const word = model.getWordUntilPosition(position);
          const range = {
            startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
            startColumn: word.startColumn, endColumn: word.endColumn,
          };
          return {
            suggestions: items.slice(0, 1000).map((it) => ({
              label: String(it.label),
              kind: COMPLETION_KIND[it.kind] ?? monaco.languages.CompletionItemKind.Text,
              detail: it.detail ?? it.kind ?? undefined,
              insertText: it.insert_text ?? String(it.label),
              range,
            })),
          };
        },
      });

      // ---- signature help (on `(` and `,`) ----
      monaco.languages.registerSignatureHelpProvider("gdscript", {
        signatureHelpTriggerCharacters: ["(", ","],
        provideSignatureHelp(_m, position) {
          if (!az) return null;
          const s = az.signatureHelp(URI, byteAt(position)); // object | null (no JSON.parse)
          if (!s) return null;
          const sigs = (s.signatures ?? []).map((sig) => ({
            label: sig.label ?? "",
            // Monaco's signature field is `parameters`; the analyzer POD names it `params`.
            parameters: (sig.params ?? []).map((p) => ({ label: p.label ?? p })),
          }));
          if (!sigs.length) return null;
          return {
            value: { signatures: sigs, activeSignature: s.active_signature ?? 0, activeParameter: s.active_parameter ?? 0 },
            dispose() {},
          };
        },
      });

      // run now + on every edit (debounced)
      let t = 0;
      model.onDidChangeContent(() => { clearTimeout(t); t = setTimeout(analyze, 150); });
      analyze();
    </script>
  </body>
</html>
