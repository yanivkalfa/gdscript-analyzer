# Labels-as-code (Phase-6 Workstream 7) — the single source of truth for repo labels.
# Synced to GitHub by `.github/workflows/labels.yml` (crazy-max/ghaction-github-labeler).
# Taxonomy follows rust-analyzer's prefixed scheme: C- category, A- area, S- status,
# P- priority, D- difficulty, plus a few meta labels. Edit here, not in the GitHub UI.

# ---- C- : category (what kind of issue) ----
- name: "C-bug"
  color: "d73a4a"
  description: "A defect: wrong output, a crash, or a regression."
- name: "C-feature"
  color: "0e8a16"
  description: "A new capability (a new diagnostic, an IDE feature, a CLI subcommand)."
- name: "C-enhancement"
  color: "84b6eb"
  description: "An improvement to existing behavior (precision, performance, ergonomics)."
- name: "C-docs"
  color: "0075ca"
  description: "Documentation: the mdBook, rustdoc, READMEs, or examples."
- name: "C-tracking"
  color: "c5def5"
  description: "A meta/umbrella issue tracking a body of work."

# ---- A- : area (which subsystem) ----
- name: "A-parser"
  color: "bfd4f2"
  description: "Lexer / parser / CST (gdscript-syntax)."
- name: "A-inference"
  color: "bfd4f2"
  description: "Type inference / name resolution / narrowing (gdscript-hir)."
- name: "A-warnings"
  color: "bfd4f2"
  description: "The Godot warning set + gating + @warning_ignore."
- name: "A-formatter"
  color: "bfd4f2"
  description: "The gdscript-fmt formatter."
- name: "A-scene"
  color: "bfd4f2"
  description: ".tscn/.tres scene awareness (gdscript-scene)."
- name: "A-cli"
  color: "bfd4f2"
  description: "The `gdscript` CLI."
- name: "A-lsp"
  color: "bfd4f2"
  description: "The language server (gdscript-lsp)."
- name: "A-wasm"
  color: "bfd4f2"
  description: "The wasm build + the browser playground."
- name: "A-perf"
  color: "bfd4f2"
  description: "Performance, incrementality, memory, binary/wasm size."
- name: "A-meta"
  color: "bfd4f2"
  description: "Repo, CI, releases, governance."

# ---- S- : status ----
- name: "S-needs-triage"
  color: "ededed"
  description: "Not yet triaged."
- name: "S-accepted"
  color: "c2e0c6"
  description: "Triaged and accepted; ready to be worked on."
- name: "S-blocked"
  color: "b60205"
  description: "Blocked on another issue / decision / upstream."
- name: "S-needs-info"
  color: "fef2c0"
  description: "Waiting on a reproduction or more information."

# ---- P- : priority ----
- name: "P-critical"
  color: "b60205"
  description: "Drop everything (data loss, crash, broken release)."
- name: "P-high"
  color: "d93f0b"
  description: "Should be addressed soon."
- name: "P-medium"
  color: "fbca04"
  description: "Normal priority."
- name: "P-low"
  color: "0e8a16"
  description: "Nice to have; no urgency."

# ---- D- : difficulty ----
- name: "D-easy"
  color: "c5def5"
  description: "A small, well-scoped change."
- name: "D-hard"
  color: "5319e7"
  description: "Needs deep context or a large change."
- name: "good-first-issue"
  color: "7057ff"
  description: "A good entry point for a new contributor."

# ---- meta ----
- name: "meta-rfc"
  color: "d4c5f9"
  description: "A proposal under the RFC process (see ADR-0004)."
- name: "meta-breaking"
  color: "e99695"
  description: "A breaking change to the frozen public API (post-1.0: a major bump)."
- name: "godot-divergence"
  color: "fef2c0"
  description: "An intentional divergence from the engine checker (e.g. #93510 narrowing)."
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates (dependabot)."
