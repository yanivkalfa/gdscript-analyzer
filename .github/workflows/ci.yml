name: CI

# The core gate (Phase 0, Workstream C.1). Runs on every PR and on pushes to
# the long-lived branches. `fmt` runs first; everything else gates behind it
# via `needs: fmt` so a formatting failure short-circuits the matrix.
on:
  pull_request:
  push:
    branches: [master, dev]

# Cancel superseded runs for the same ref (keeps PR queues fast).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  msrv:
    name: msrv (1.88.0)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      # Pin to the declared MSRV (napi-rs v3 floor); the whole workspace must
      # build on this toolchain.
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo hack check --rust-version --workspace

  wasm:
    name: wasm portability guard
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # The single most important Phase-0 invariant after "it compiles": the
      # public surface must build on the browser target.
      - run: cargo check -p gdscript-ide --target wasm32-unknown-unknown

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: fmt
    # Non-blocking at Phase 0 (no real code yet) but wired so it grows.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  pr-title:
    name: pr-title (conventional commits)
    runs-on: ubuntu-latest
    # PR events only: lint the PR title so the squash-merge commit is a valid
    # Conventional Commit (release-plz reads it).
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
