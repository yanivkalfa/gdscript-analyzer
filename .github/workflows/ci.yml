name: CI

# The core gate (Phase 0, Workstream C.1). Runs on every PR and on pushes to
# the long-lived branches. `fmt` runs first; everything else gates behind it
# via `needs: fmt` so a formatting failure short-circuits the matrix.
on:
  pull_request:
  push:
    branches: [master, dev]

# Cancel superseded runs for the same ref (keeps PR queues fast).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # No `--workspace`: uses `default-members`, which excludes the FFI bindings
      # (they build on their own targets — napi via @napi-rs/cli, wasm via wasm-pack).
      - run: cargo test

  msrv:
    name: msrv (1.88.0)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      # Pin to the declared MSRV (napi-rs v3 floor); the whole workspace must
      # build on this toolchain.
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      # Exclude the FFI bindings: `gdscript-ffi` (napi) floors at 1.88 but needs
      # libnode to build, and `gdscript-wasm` builds only on wasm32.
      - run: cargo hack check --rust-version --workspace --exclude gdscript-ffi --exclude gdscript-wasm

  wasm:
    name: wasm portability guard
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # The single most important invariant after "it compiles": the public surface
      # must build on the browser target — both the core and the browser binding.
      - name: core builds for wasm32
        run: cargo check -p gdscript-ide --target wasm32-unknown-unknown
      - name: browser binding builds for wasm32
        run: cargo build -p gdscript-wasm --target wasm32-unknown-unknown
      # `getrandom` is a wasm footgun (its JS backend needs an explicit feature). Assert
      # it never enters the browser runtime graph. `cargo tree -i` exits non-zero when
      # the package is absent — which is exactly what we want, so invert it.
      - name: getrandom stays out of the wasm runtime graph
        run: |
          if cargo tree -p gdscript-wasm -i getrandom --target wasm32-unknown-unknown --edges normal 2>/dev/null; then
            echo "::error::getrandom entered the wasm runtime graph"; exit 1
          else
            echo "ok: getrandom is absent from the wasm runtime graph"
          fi

  differential:
    name: differential (vs tree-sitter)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compiles tree-sitter-gdscript's C parser (cc) — native-only, feature-gated.
      - run: cargo test -p gdscript-syntax --features tree-sitter-oracle --test differential

  bindings:
    name: bindings demo (node + browser)
    runs-on: ubuntu-latest
    needs: fmt
    # The two Phase-1 exit demos. Non-blocking while the cross-platform publish matrix
    # is wired in Phase 5 (local Windows-gnu can't build the napi .node — no libnode).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # current LTS; the npm `engines` floor stays at >=20 for consumers
      # Node path: build the napi addon and run the hello demo.
      - name: build node addon + run hello.mjs
        working-directory: bindings/node
        run: |
          npm install
          npm run build
          node hello.mjs
      # Browser path: package the wasm-bindgen binding with wasm-pack.
      - name: install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: build browser package
        run: wasm-pack build --target web --out-dir playground/pkg --out-name gdscript bindings/wasm

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: fmt
    # Non-blocking at Phase 0 (no real code yet) but wired so it grows.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  pr-title:
    name: pr-title (conventional commits)
    runs-on: ubuntu-latest
    # PR events only: lint the PR title so the squash-merge commit is a valid
    # Conventional Commit (release-plz reads it).
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
