name: Sync Godot extension_api.json

# Godot-sync watcher (Phase 0, Workstream E.3 / GODOT-SYNC.md).
#
# Resolves the latest Godot stable tag, fetches extension_api.json from
# godot-cpp at the matching tag, and — if it changed against the vendored copy —
# vendors it, runs `cargo xtask codegen-api`, and opens/updates a PR with
# base: master.
#
# CAVEATS (load-bearing GitHub Actions behaviour):
#   - `schedule` runs ONLY on the latest commit of the DEFAULT branch, has a
#     5-minute minimum, is delayed under load (hence cron at :17, off-peak),
#     and is AUTO-DISABLED after 60 days of repo inactivity (a commit re-enables
#     it; `workflow_dispatch` always works).
#   - Requires repo setting: Settings -> Actions -> General ->
#     "Allow GitHub Actions to create and approve pull requests."
#   - PRs opened by the default GITHUB_TOKEN do NOT trigger downstream CI, so this
#     workflow opens the PR with a PAT (secrets.GODOT_SYNC_TOKEN) — that makes the
#     required CI checks run on it (the branch ruleset would otherwise leave a
#     GITHUB_TOKEN-opened PR unmergeable). Falls back to GITHUB_TOKEN if unset.
on:
  schedule:
    - cron: '17 6 * * *' # daily 06:17 UTC (off-peak)
  workflow_dispatch:
    inputs:
      godot_tag:
        description: 'Override Godot tag (e.g. 4.4.1-stable). Empty = latest stable.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: godot-api-sync
  cancel-in-progress: false

jobs:
  sync:
    name: sync
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Resolve latest godot-cpp stable API tag # PIPELINE STEP 1 (detect)
        id: godot
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.godot_tag }}" ]; then
            TAG="${{ inputs.godot_tag }}"
          else
            # `godot-cpp` is the API source and LAGS `godotengine/godot` releases (e.g.
            # Godot may be at 4.7-stable while godot-cpp's newest release is 4.6-stable).
            # Resolve from godot-cpp's own `godot-<ver>-stable` release TAGS (its
            # branches are `4.x`/`4.0`-style, not the stable refs we fetch) so the fetch
            # below never 404s on a tag godot-cpp hasn't caught up to.
            TAG="$(gh api repos/godotengine/godot-cpp/tags --paginate --jq '.[].name' \
                     | grep -E '^godot-[0-9]+\.[0-9]+(\.[0-9]+)?-stable$' \
                     | sed 's/^godot-//' | sort -V | tail -1)"
          fi
          echo "$TAG" | grep -Eq '^[0-9]+\.[0-9]+(\.[0-9]+)?-stable$' \
            || { echo "::error::bad tag $TAG"; exit 1; }
          VER="${TAG%-stable}"
          MINOR="$(echo "$VER" | cut -d. -f1,2)"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "ver=$VER"     >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream extension_api.json (godot-cpp @ tag) # PIPELINE STEP 2 (obtain)
        run: |
          set -euo pipefail
          VER="${{ steps.godot.outputs.ver }}"
          MINOR="${{ steps.godot.outputs.minor }}"
          base="https://raw.githubusercontent.com/godotengine/godot-cpp"
          # godot-cpp branches are PREFIXED with `godot-`. Try the exact version, then
          # fall back to the minor branch (godot-cpp doesn't tag every patch release —
          # e.g. `godot-4.5.1-stable` may 404 while `godot-4.5-stable` exists).
          if ! curl -fsSL "$base/godot-${VER}-stable/gdextension/extension_api.json" -o new_extension_api.json; then
            echo "::notice::godot-cpp has no godot-${VER}-stable branch; falling back to godot-${MINOR}-stable"
            curl -fsSL "$base/godot-${MINOR}-stable/gdextension/extension_api.json" -o new_extension_api.json
          fi
          # Fallback (B): download the matching Godot editor release binary and run
          #   ./Godot --headless --dump-extension-api --dump-extension-api-with-docs
          # (use for doc XML the JSON omits, or if godot-cpp lags the minor too).

      - name: Diff, vendor, regenerate # PIPELINE STEPS 3-4 (diff + regenerate)
        id: diff
        run: |
          set -euo pipefail
          VER="${{ steps.godot.outputs.ver }}"
          DEST="vendor/godot/${VER}-stable"
          if [ -f "${DEST}/extension_api.json" ] \
             && cmp -s new_extension_api.json "${DEST}/extension_api.json"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change vs vendored ${VER}-stable."
            exit 0
          fi
          mkdir -p "${DEST}"
          cp new_extension_api.json "${DEST}/extension_api.json"
          # Regenerate the gdscript-api data artifact from the newest vendored JSON.
          cargo xtask codegen-api
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open / update PR # PIPELINE STEP 6 (surface)
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # Use a PAT (GODOT_SYNC_TOKEN) so the sync PR is created by a real identity
          # and therefore TRIGGERS the required CI checks. The default GITHUB_TOKEN
          # would open the PR but suppress its CI, leaving it unmergeable under the
          # branch ruleset. Falls back to GITHUB_TOKEN if the secret is unset.
          token: ${{ secrets.GODOT_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          base: master
          branch: chore/godot-api-sync # stable branch => idempotent (updates existing PR)
          delete-branch: false
          commit-message: 'chore(api): sync to Godot ${{ steps.godot.outputs.tag }}'
          title: 'chore(api): sync to Godot ${{ steps.godot.outputs.tag }}'
          body: |
            Automated sync to **Godot ${{ steps.godot.outputs.tag }}**
            (source: godot-cpp @ `godot-${{ steps.godot.outputs.ver }}-stable`).

            - Vendored `vendor/godot/${{ steps.godot.outputs.ver }}-stable/extension_api.json`
            - Ran `cargo xtask codegen-api`

            See `plans/GODOT-SYNC.md` for the full delta/triage process.
          labels: |
            dependencies
            godot-sync
