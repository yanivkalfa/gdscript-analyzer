name: release-wasm

# Build + publish the wasm-bindgen browser package `@gdscript-analyzer/wasm` (Phase 5 GA).
#
# Fires on the `v<version>` tag release-plz pushes (build-only on workflow_dispatch). Single
# `--target web` package (the playground/ESM consumer); bundler/nodejs variants are a follow-up.
# wasm-pack generates `pkg/package.json` from the crate (`gdscript-wasm`) — we rewrite the name to
# the exact scoped `@gdscript-analyzer/wasm` and publish that with provenance (`npm publish`, NOT
# `wasm-pack publish`, which has no --provenance/--access).
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-wasm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: build + publish @gdscript-analyzer/wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm provenance
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.15.0"
      - name: Build the wasm package
        run: wasm-pack build --target web --release --out-dir pkg bindings/wasm
      - name: Rewrite to the scoped package name + publish config
        run: |
          cd bindings/wasm/pkg
          npm pkg set name='@gdscript-analyzer/wasm'
          npm pkg set publishConfig.access='public'
          npm pkg set publishConfig.provenance=true --json
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org" # writes .npmrc (required for provenance)
      - name: Publish (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd bindings/wasm/pkg
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
