name: release-plz

# Rust release engine — the crates.io side + the version/tag that drives the whole release
# (Phase 5 GA). On every push to master:
#   - release-pr  : opens/updates the "Release PR" (version bump + git-cliff changelog +
#                   cargo-semver-checks).
#   - release     : after that PR merges, publishes the public crates to crates.io (via OIDC
#                   Trusted Publishing — no token) and pushes the `v<version>` tag.
#
# CRITICAL (the #1 release footgun): the tag MUST be pushed with a PAT / App token, NOT the
# default GITHUB_TOKEN — GITHUB_TOKEN-authored events do NOT trigger other workflows, so the tag
# would not fire release-napi / release-wasm / dist. We pass `secrets.RELEASE_PLZ_TOKEN` (a PAT or
# GitHub App token with contents+pull-requests write) so the tag (and the Release PR) trigger CI.
#
# Release ownership is split (avoids two tools racing on the GitHub Release): release-plz owns
# version + changelog + tag + crates.io publish (`git_tag_enable=true`, `git_release_enable=false`
# in release-plz.toml); `dist` owns the GitHub Release + binary uploads (release.yml).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC for crates.io Trusted Publishing (release-plz does the exchange natively)

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Publish released crates + push the tag once a Release PR lands on master.
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz (release)
        uses: release-plz/[email protected]
        with:
          command: release
        env:
          # PAT/App token so the pushed `v<version>` tag triggers release-napi/wasm/dist.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          # crates.io auth via an API token — the simplest path, and (unlike OIDC Trusted
          # Publishing) it can do a crate's FIRST publish with no manual bootstrap. To upgrade to
          # tokenless OIDC later: drop this, keep `id-token: write`, and add a trusted publisher per
          # crate on crates.io (after the first publish).
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Maintain the Release PR (version bump + changelog) on every push to master.
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz (release-pr)
        uses: release-plz/[email protected]
        with:
          command: release-pr
        env:
          # PAT/App token so the Release PR's required CI checks run.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
