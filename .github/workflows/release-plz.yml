name: release-plz

# Rust release engine (Phase 0, Workstream D). On every push to master:
#   - the release-pr job opens/updates the "Release PR" (version bump +
#     git-cliff changelog + cargo-semver-checks);
#   - the release job, after that PR merges, tags v<version> and publishes to
#     crates.io via OIDC / Trusted Publishing (no token).
#
# NOTE: npm publishing is a SEPARATE gated step driven by Changesets
# (.changeset/*) and the release-napi / release-wasm workflows; release-plz has
# no package.json awareness. The §D.2 version-sync step bridges the two.
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC for crates.io Trusted Publishing

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Tag + publish released crates once a Release PR lands on master.
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz (release)
        uses: release-plz/action@v0
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No CARGO_REGISTRY_TOKEN: crates.io publish uses OIDC Trusted
          # Publishing (id-token: write above).

  # Maintain the Release PR (version bump + changelog) on every push.
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    # Avoid two release-plz runs racing on the same ref.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
