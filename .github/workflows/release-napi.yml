name: release-napi

# napi (Node) binding cross-compile matrix (Phase 0, Workstream C.2).
#
# PHASE-0 SKELETON. The napi binding (`gdscript-ffi` / bindings/node) is a bare
# cdylib stub with NO napi-rs wiring yet (that lands in Phase 1). So this
# workflow is `workflow_dispatch`-only and the build step is a plain
# `cargo build -p gdscript-ffi --release` placeholder that proves the
# cross-compile toolchain works against an empty addon.
#
# PHASE 1 will swap the placeholder build for the real napi CLI per the matrix:
#   - native (macOS/Windows):           napi build --platform --release --target <triple>
#   - linux gnu / armv7 (--use-napi-cross via zig):  napi build --use-napi-cross
#   - linux musl (-x via cargo-zigbuild):            napi build -x
#   - wasm32-wasip1-threads:                         napi build (wasm)
# and add: mlugg/setup-zig, taiki-e/install-action (cargo-zigbuild),
# docker/setup-qemu-action (ARM test emulation).
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-napi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- native ----
          - os: macos-latest
            target: x86_64-apple-darwin
            build: native
          - os: macos-latest
            target: aarch64-apple-darwin
            build: native
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: native
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            build: native
          # ---- linux gnu (Phase 1: napi build --use-napi-cross / zig) ----
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: napi-cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: napi-cross
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            build: napi-cross
          # ---- linux musl (Phase 1: napi build -x / cargo-zigbuild) ----
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: zigbuild
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: zigbuild
          # ---- napi wasm output ----
          - os: ubuntu-latest
            target: wasm32-wasip1-threads
            build: napi-wasm
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain (+ target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # PHASE-0 PLACEHOLDER: build the empty cdylib stub so we exercise the
      # cross-compile matrix structure. Phase 1 replaces this with `napi build`
      # (--use-napi-cross / -x / native) per `matrix.build`.
      - name: Build (placeholder — Phase 1 swaps in `napi build`)
        run: cargo build -p gdscript-ffi --release
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: target/release/*gdscript_ffi*
          if-no-files-found: ignore

  # Publish stub: gated on a release event, which never fires at Phase 0
  # (dispatch-only). Phase 1/5 will download all artifacts, run `napi
  # artifacts`, and `npm publish --provenance`.
  publish:
    name: publish (gated — release only)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write # OIDC for npm provenance
    steps:
      - uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: "Publish (Phase 1+: napi artifacts && npm publish --provenance)"
        run: echo "Phase 0 stub — no napi crate yet; nothing to publish."
