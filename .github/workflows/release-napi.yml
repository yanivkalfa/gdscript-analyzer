name: release-napi

# Build + publish the napi Node addon `@gdscript-analyzer/core` (Phase 5 GA).
#
# Fires when release-plz pushes a `v<version>` tag (which requires release-plz to push with a
# PAT/App token — the default GITHUB_TOKEN does NOT trigger downstream workflows). Also
# `workflow_dispatch`: build-only by default, or `publish: true` to re-publish core as a recovery
# route when a tag run failed after a fix landed (see the publish job's `if`).
#
# Modeled on the official napi-rs/package-template CI (@napi-rs/cli v3). Per-target build:
#   native (mac/win)          : napi build --platform --release --target <triple>
#   linux aarch64 gnu (cross) : … --use-napi-cross
# The matrix MUST match `bindings/node/package.json`'s `napi.targets` (drives `napi prepublish`).
# Native targets: x64/arm64 macOS + Windows (incl. win-arm64, a native MSVC cross), x64/arm64 Linux
# gnu (cross via --use-napi-cross). STILL DEFERRED (each needs a CI-verified toolchain step):
#   - x86_64/aarch64-unknown-linux-musl : zigbuild — add `cargo-zigbuild` + `ziglang` setup, build `-x`
#   - armv7-unknown-linux-gnueabihf     : cross-compile (--use-napi-cross or zigbuild)
#   - wasm32-wasip1-threads (WASI fallback) : emnapi runtime deps + WASI-SDK link step (unproven)
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Re-publish @gdscript-analyzer/core to npm. Use to recover a release whose tag run failed AFTER the fix is on the selected branch; builds at that branch's package.json version. Leave false for a build-only check."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-napi-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: bindings/node

jobs:
  build:
    name: build (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npm run build -- --target aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --use-napi-cross
          # wasm32-wasip1-threads is intentionally OMITTED from this first GA: it needs the emnapi
          # runtime packages + WASI glue uploads + a WASI-SDK link step, none of which are proven. The
          # 5 native targets cover the Node consumers (incl. the guitkx editor extension); the BROWSER
          # need is served by the separate wasm-bindgen package @gdscript-analyzer/wasm. Re-add wasm
          # here AND in bindings/node/package.json napi.targets (in lockstep) once it's proven green.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: napi-${{ matrix.settings.target }}
          workspaces: ". -> target"
      - name: npm install
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.node # native targets emit one .node each (wasm target dropped for this GA)
          if-no-files-found: error
      # `napi build` ALSO emits the JS loader (index.js) + types (index.d.ts) — but they are gitignored,
      # so the publish job's fresh checkout does NOT have them, and the publish job never runs `napi
      # build`. Without these the MAIN @gdscript-analyzer/core tarball ships `main: index.js`/`types:
      # index.d.ts` pointing at missing files -> `require()` throws MODULE_NOT_FOUND. They are identical
      # across targets, so upload them ONCE (from the linux row) and the publish job restores them.
      - name: Upload the JS loader + types (publish restores these into the package root)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: napi-js-loader
          path: |
            bindings/node/index.js
            bindings/node/index.d.ts
          if-no-files-found: error

  publish:
    name: publish @gdscript-analyzer/core
    needs: build
    runs-on: ubuntu-latest
    # Publish on a release tag, OR on a manual workflow_dispatch with `publish: true`. The dispatch path
    # is the RECOVERY route: when a tag run fails after a fix lands, re-publish core at the branch's
    # version WITHOUT re-firing the wasm/dist tag workflows (which would collide with already-published
    # versions). github.ref is a branch on dispatch, so the tag check is false there — hence the `||`.
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish
    permissions:
      contents: read
      id-token: write # OIDC for npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org" # writes .npmrc (required for provenance)
      - name: npm install
        run: npm install
      - name: Create npm dirs
        run: npm exec napi create-npm-dirs
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: bindings/node/artifacts
      # Restore the gitignored loader+types that the build job uploaded (see the build job's upload step).
      # Must happen before `npm run artifacts`/publish so the main package tarball contains them.
      - name: Restore the JS loader + types into the package root
        run: |
          cp artifacts/napi-js-loader/index.js index.js
          cp artifacts/napi-js-loader/index.d.ts index.d.ts
      - name: Move artifacts into per-platform packages
        run: npm run artifacts
      - name: Publish (provenance + prepublishOnly patches optionalDependencies)
        run: |
          npm config set provenance true
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
