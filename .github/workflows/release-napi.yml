name: release-napi

# Build + publish the napi Node addon `@gdscript-analyzer/core` (Phase 5 GA).
#
# Fires when release-plz pushes a `v<version>` tag (which requires release-plz to push with a
# PAT/App token — the default GITHUB_TOKEN does NOT trigger downstream workflows). Also
# `workflow_dispatch` for manual runs (build-only; publish is gated on a tag).
#
# Modeled on the official napi-rs/package-template CI (@napi-rs/cli v3). Per-target build:
#   native (mac/win)          : napi build --platform --release --target <triple>
#   linux aarch64 gnu (cross) : … --use-napi-cross
#   wasm                      : … --target wasm32-wasip1-threads
# The matrix MUST match `bindings/node/package.json`'s `napi.targets` (drives `napi prepublish`).
# (musl/zigbuild, armv7, win-arm64 are deferred to a follow-up once this flow is proven.)
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-napi-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: bindings/node

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
            build: npm run build -- --target wasm32-wasip1-threads
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: napi-${{ matrix.settings.target }}
          workspaces: ". -> target"
      - name: npm install
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.{node,wasm}
          if-no-files-found: error

  publish:
    name: publish @gdscript-analyzer/core
    needs: build
    runs-on: ubuntu-latest
    # Publish only on a release tag (build-only on workflow_dispatch).
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write # OIDC for npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org" # writes .npmrc (required for provenance)
      - name: npm install
        run: npm install
      - name: Create npm dirs
        run: npm exec napi create-npm-dirs
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: bindings/node/artifacts
      - name: Move artifacts into per-platform packages
        run: npm run artifacts
      - name: Publish (provenance + prepublishOnly patches optionalDependencies)
        run: |
          npm config set provenance true
          npm publish --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
